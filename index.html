<!DOCTYPE html>
<html>
<head>
<title>WhatsApp Campaign Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px;
width:100%;
margin-top:10px;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.progress{
width:100%;
background:#eee;
border-radius:10px;
margin-top:20px;
}

.bar{
height:20px;
background:#25D366;
width:0%;
border-radius:10px;
}

.preview-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
margin-top:10px;
}

.image-card{
border:1px solid #ddd;
padding:5px;
border-radius:6px;
text-align:center;
}

.image-card img{
width:100%;
height:90px;
object-fit:cover;
border-radius:4px;
}

.sent-list{
margin-top:20px;
border-top:1px solid #ddd;
padding-top:10px;
}

.sent-item{
background:#f7f7f7;
padding:8px;
margin-top:5px;
border-radius:5px;
}

</style>
</head>

<body>

<div class="container">

<h2>WhatsApp Campaign Sender</h2>

<label>Upload Excel</label>
<input type="file" id="excelFile">

<label>Message</label>
<textarea id="message" rows="4" placeholder="Hello {name}, admissions open..."></textarea>

<label>Select Images</label>
<input type="file" id="imageInput" multiple accept="image/*">

<div class="preview-grid" id="preview"></div>

<button onclick="startCampaign()">Start Campaign</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<p id="status"></p>

<div class="sent-list">
<h3>Messages Sent</h3>
<div id="sentContainer"></div>
</div>

</div>

<script>

let students=[]
let index=0
let imageFiles=[]

document.getElementById("imageInput").addEventListener("change",function(){

let preview=document.getElementById("preview")
preview.innerHTML=""

imageFiles=[...this.files]

imageFiles.forEach((file,i)=>{

let reader=new FileReader()

reader.onload=function(e){

let card=document.createElement("div")
card.className="image-card"

card.innerHTML=`
<img src="${e.target.result}">
<br>
<label>
<input type="checkbox" checked data-index="${i}">
Send
</label>
`

preview.appendChild(card)

}

reader.readAsDataURL(file)

})

})

function startCampaign(){

const file=document.getElementById("excelFile").files[0]

const reader=new FileReader()

reader.onload=function(e){

const data=new Uint8Array(e.target.result)
const workbook=XLSX.read(data,{type:'array'})
const sheet=workbook.Sheets[workbook.SheetNames[0]]

students=XLSX.utils.sheet_to_json(sheet)

sendNext()

}

reader.readAsArrayBuffer(file)

}

function sendNext(){

if(index>=students.length){

document.getElementById("status").innerText="Campaign Completed"

return
}

let name=students[index].Name
let phone=students[index].Phone

let template=document.getElementById("message").value

let message=template.replace("{name}",name)

let selectedImages=[]

document.querySelectorAll("#preview input[type=checkbox]").forEach(cb=>{
if(cb.checked){
let img=document.querySelectorAll("#preview img")[cb.dataset.index]
selectedImages.push(img.src)
}
})

if(selectedImages.length>0){

message+="\n\nBrochure 👇\n"

selectedImages.forEach(img=>{
message+="\n"+img
})

}

let url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`

window.open(url,"_blank")

index++

let progress=(index/students.length)*100

document.getElementById("bar").style.width=progress+"%"

document.getElementById("status").innerText=`Sending ${index} / ${students.length}`

let sentItem=document.createElement("div")
sentItem.className="sent-item"
sentItem.innerText=name+" - "+phone

document.getElementById("sentContainer").appendChild(sentItem)

setTimeout(sendNext,5000)

}

</script>

</body>
</html>
